# ============================================
# AI Healthcare Avatar Platform
# PRODUCTION Docker Compose Configuration
# ============================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Features:
#   - Production hardening
#   - Restart policies
#   - Resource limits
#   - Health checks
#   - Named volumes
# ============================================

version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_PROD_API_URL: ${VITE_PROD_API_URL}
        VITE_ENABLE_SPEECH: ${VITE_ENABLE_SPEECH:-true}
        VITE_ENABLE_STREAMING: ${VITE_ENABLE_STREAMING:-true}
        VITE_ENABLE_EMOTIONS: ${VITE_ENABLE_EMOTIONS:-true}
    container_name: avatar-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - avatar-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: avatar-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - FRONTEND_URL=${FRONTEND_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - avatar-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  mongodb:
    image: mongo:7-jammy
    container_name: avatar-mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_DATABASE=avatar_db
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - avatar-network
    restart: always
    healthcheck:
      test: echo 'db.runCommand({ping: 1}).ok' | mongosh localhost:27017/avatar_db --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  mongodb_data:
    driver: local

networks:
  avatar-network:
    driver: bridge
