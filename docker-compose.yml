# ============================================
# AI Healthcare Avatar Platform
# Docker Compose Configuration
# ============================================
# Usage:
#   docker compose up              # Start all services
#   docker compose up -d           # Start in detached mode
#   docker compose down            # Stop all services
#   docker compose down -v         # Stop and remove volumes
#   docker compose logs -f         # Follow logs
#   docker compose ps              # List running services
#
# For Ollama (optional - run locally or in container):
#   Option 1: Run Ollama on host (recommended for hackathons)
#   Option 2: Include ollama service below
# ============================================

version: '3.8'

services:
  # Frontend - React + Vite + Nginx
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_PROD_API_URL: ${VITE_PROD_API_URL:-http://localhost:3001}
        VITE_ENABLE_SPEECH: ${VITE_ENABLE_SPEECH:-true}
        VITE_ENABLE_STREAMING: ${VITE_ENABLE_STREAMING:-true}
        VITE_ENABLE_EMOTIONS: ${VITE_ENABLE_EMOTIONS:-true}
    container_name: avatar-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - avatar-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend - Express.js API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: avatar-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      # Server Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3001}

      # MongoDB Configuration
      # Option 1: Use MongoDB container (set below)
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/avatar_db}

      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-secret-key}

      # Ollama Configuration
      # For local Ollama on host: http://host.docker.internal:11434
      # For Ollama container: http://ollama:11434
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi3}

      # CORS Configuration
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}

      # Cloud AI Providers (optional fallbacks)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - avatar-network
    restart: unless-stopped
    volumes:
      # For hot reload in development (optional)
      - ./backend:/app:ro
      - /app/node_modules

  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: avatar-mongodb
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    environment:
      - MONGO_INITDB_DATABASE=avatar_db
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - avatar-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand({ping: 1}).ok' | mongosh localhost:27017/avatar_db --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Ollama Service (uncomment to run in Docker)
  # Note: For hackathons, running Ollama on host is often easier
  # as GPU passthrough can be complex on some systems
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: avatar-ollama
  #   ports:
  #     - "${OLLAMA_PORT:-11434}:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - avatar-network
  #   restart: unless-stopped
  #   # For GPU support (NVIDIA)
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s

# Named volumes for data persistence
volumes:
  mongodb_data:
    driver: local
  # ollama_data:
  #   driver: local

# Custom network for service communication
networks:
  avatar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
